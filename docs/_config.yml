title: Patria
description: An independent European editorial intelligence. Sourced. Opinionated. European.
baseurl: "/patria"
url: "https://nostra-patria.github.io"
lang: en
theme: null

# Build
future: true
markdown: kramdown
highlighter: rouge
permalink: /articles/:year/:month/:slug/

# Collections / posts
paginate: 12
paginate_path: "/articles/page/:num/"

# Plugins (GitHub Pages safe)
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - "*.sh"

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "article"
      author: "Patria"

# Stars metadata (used by templates)
stars:
  - id: 1
    label: "European Federation"
    color: "#3b82f6"
  - id: 2
    label: "Defence & Foreign Policy"
    color: "#ef4444"
  - id: 3
    label: "Europe in the World"
    color: "#8b5cf6"
  - id: 4
    label: "Borders, Migration & Justice"
    color: "#f97316"
  - id: 5
    label: "Energy Sovereignty"
    color: "#eab308"
  - id: 6
    label: "The Digital Age"
    color: "#06b6d4"
  - id: 7
